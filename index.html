<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>检测网站是否挂了</title>
    <script src="xlsx.full.min.js">
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .panel {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            min-width: 350px;
            max-width: 500px;
        }

        .right-panel {
            flex: 2;
        }

        h1 {
            color: #333;
            margin: 0 0 5px 0;
            font-size: 28px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        /* 桌面端左侧按钮纵向排列 */
        @media (min-width: 901px) {
            .left-panel .input-group {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .left-panel .input-group button,
            .left-panel .input-group input[type="text"] {
                width: 100%;
                box-sizing: border-box;
            }
            .left-panel .input-group span {
                width: 100%;
            }
        }

        .input-group label {
            font-size: 13px;
            color: #555;
            white-space: nowrap;
        }

        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #007BFF;
            outline: none;
        }

        input.invalid {
            border-color: red;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            50% {
                transform: translateX(5px);
            }
            75% {
                transform: translateX(-5px);
            }
            100% {
                transform: translateX(0);
            }
        }

        button {
            padding: 8px 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button.danger {
            background-color: #dc3545;
        }
        button.danger:hover {
            background-color: #a71d2a;
        }

        button.success {
            background-color: #28a745;
        }
        button.success:hover {
            background-color: #1e7e34;
        }

        #url-list {
            list-style-type: none;
            padding: 0;
            margin: 10px 0;
            overflow-y: auto;
            flex: 1;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #fafafa;
        }

        li {
            background-color: #fff;
            padding: 8px 10px;
            margin-bottom: 1px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        li:last-child {
            border-bottom: none;
        }

        .url-text {
            color: #333;
            text-decoration: none;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }

        .url-text:hover {
            color: #007BFF;
        }

        li button {
            padding: 4px 8px;
            font-size: 12px;
            background-color: #6c757d;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .log-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #progress-bar-container {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
            display: none;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007BFF, #00d2ff);
            transition: width 0.3s;
        }

        #log-container {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
            background: #f9f9f9;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 2px;
        }
        .status-normal {
            color: #28a745;
        }
        .status-error {
            color: #dc3545;
        }

        #site-footer {
            width: 100%;
            background: #fff;
            box-sizing: border-box;
            padding: 8px 20px;
            border-top: 1px solid #eee;
        }
        #site-footer .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: nowrap;
        }
        #site-footer .footer-inner a {
            color: #000;
            text-decoration: none;
            font-size: 13px;
        }
        #site-footer .footer-inner img {
            height: 16px;
            width: 16px;
            vertical-align: middle;
            margin-right: 4px;
        }
        #site-footer .notice {
            color: red;
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
                padding: 8px;
                overflow: auto;
            }
            .left-panel,
            .right-panel {
                width: 100%;
                height: auto;
                flex: none;
                min-width: 0;
                max-width: 100%;
            }
            #url-list {
                max-height: 220px;
            }
            body {
                overflow: auto;
                height: auto;
            }
            .log-controls {
                flex-wrap: wrap;
            }
            #site-footer .footer-inner {
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
            .input-group {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            button, input[type="text"] {
                font-size: 13px;
                padding: 8px 8px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }
            .subtitle {
                font-size: 11px;
            }
            .panel {
                padding: 10px;
            }
            #progress-text, #summary-text {
                font-size: 11px;
            }
            .log-header {
                flex-direction: column;
                gap: 6px;
            }
            .footer-inner {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <!-- 更多工具尽在忆痕发布页www.937788.xyz -->
        <!-- 左侧面板 -->
        <div class="panel left-panel">
            <h1>检测网站是否挂了</h1>
            <div class="subtitle">网络检测基于当前浏览器环境，只要能连通即算正常</br>非代理/代理模式下结果可能有差异</div>

            <div class="input-group">
                <input type="text" id="url-input" placeholder="输入网址 (如 www.937788.xyz)">
                <button id="add-url">添加</button>
            </div>
            <div class="input-group">
                <input type="file" id="bookmark-file" accept=".html,.htm,.xlsx" style="display:none" onchange="document.getElementById('file-name').textContent = this.files[0]?.name || ''">
                <button onclick="document.getElementById('bookmark-file').click()" style="flex:1; min-width:0;">选择收藏夹HTML或XLSX格式文件</button>
                <button id="import-bookmarks" class="success">导入</button>
                <span id="file-name" style="font-size:12px; color:#666; margin-left:5px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <span style="font-weight:bold; color:#555;">网址列表 (<span id="url-count">0</span>)</span>
                <button id="clear-urls" style="padding:8px 16px; font-size:12px; background:#6c757d; border-radius:4px;">清空</button>
            </div>

            <ul id="url-list"></ul>

            <div class="input-group" style="margin-top: 10px;">
                <button id="check-once-button" class="success" style="width:100%; font-size:16px; padding:12px;">开始监测</button>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="panel right-panel">
            <div class="log-header">
                <div class="log-controls">
                    <label>筛选状态:</label>
                    <select id="filter-status" style="padding: 4px;">
                        <option value="all">全部</option>
                        <option value="normal">正常</option>
                        <option value="error">异常</option>
                    </select>
                </div>
                <div class="log-controls">
                    <button id="export-logs" class="success">导出日志(XLSX)</button>
                    <button id="clear-logs" class="danger">清空日志</button>
                </div>
            </div>

            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:12px; color:#666; margin-bottom:5px;">
                <span id="progress-text">等待开始...</span>
                <span id="summary-text"></span>
            </div>

            <div id="log-container"></div>
        </div>
    </div>

    <footer id="site-footer">
        <div class="footer-inner">
            <span class="notice">本站内容仅供学习和交流，非商业用途</span>
            <a class="beian-link" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">浙ICP备2025187466号</a>
            <a class="gongan-link" href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener">
                <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" />浙公网安备33030402001483号
            </a>
        </div>
    </footer>

    <script>
        // DOM 元素
        const urlInput = document.getElementById('url-input');
        const addUrlButton = document.getElementById('add-url');
        const urlList = document.getElementById('url-list');
        const logContainer = document.getElementById('log-container');
        const filterStatusSelect = document.getElementById('filter-status');
        const bookmarkFileInput = document.getElementById('bookmark-file');
        const importBookmarksButton = document.getElementById('import-bookmarks');
        const checkOnceButton = document.getElementById('check-once-button');
        const exportLogsButton = document.getElementById('export-logs');
        const clearLogsButton = document.getElementById('clear-logs');
        const clearUrlsButton = document.getElementById('clear-urls');
        const progressBarContainer = document.getElementById('progress-bar-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const summaryText = document.getElementById('summary-text');
        const fileNameSpan = document.getElementById('file-name');

        // 状态
        let urls = [];
        let logs = [];
        let isChecking = false;
        let stopRequested = false;
        let totalToCheck = 0;
        let finishedCount = 0;
        let normalCount = 0;
        let errorCount = 0;

        // 并发控制
        const CONCURRENCY_LIMIT = 10;
        let activeCount = 0;
        const requestQueue = [];
        let queueProcessing = false;

        // 处理队列
        async function processQueue() {
            if (queueProcessing) return;
            queueProcessing = true;
            try {
                while (!stopRequested && activeCount < CONCURRENCY_LIMIT && requestQueue.length > 0) {
                    const item = requestQueue.shift();
                    activeCount++;
                    (async () => {
                        try {
                            await checkUrl(item.url);
                        } catch (e) {
                            console.error(e);
                        }
                        activeCount--;
                        updateProgress();
                        if (!stopRequested) processQueue();
                    })();
                }
            } finally {
                queueProcessing = false;
            }
        }

        function scheduleCheck(url) {
            requestQueue.push({ url });
            setTimeout(() => {
                if (!stopRequested) processQueue();
            }, 0);
        }

        // 进度
        function updateProgress() {
            finishedCount++;
            const percent = totalToCheck ? Math.round((finishedCount / totalToCheck) * 100) : 0;
            progressBar.style.width = `${percent}%`;
            progressText.textContent = `检测中: ${finishedCount} / ${totalToCheck}`;
            summaryText.textContent = `正常: ${normalCount} | 异常: ${errorCount}`;

            if (finishedCount >= totalToCheck) {
                progressText.textContent = `检测完成 (共 ${totalToCheck} 个网址)`;
                checkOnceButton.textContent = '开始监测';
                checkOnceButton.classList.remove('danger');
                isChecking = false;
                stopRequested = false;
            }
        }

        // 检测核心（简单模式：只要网络可达即正常）
        function checkUrl(url) {
            const startTime = performance.now();
            return fetch(url, { method: 'GET', mode: 'no-cors', cache: 'no-store' })
                .then(() => {
                    const time = Math.round(performance.now() - startTime);
                    handleLog(url, time, '正常', null);
                    normalCount++;
                })
                .catch(err => {
                    const time = Math.round(performance.now() - startTime);
                    let errorMsg = '网络错误/服务器不可达';
                    if (err.name === 'AbortError') errorMsg = '请求超时';
                    handleLog(url, time, '异常', errorMsg);
                    errorCount++;
                });
        }

        function handleLog(url, time, status, errorMsg) {
            logs.push({ url, time, status, error: errorMsg, timestamp: new Date().toLocaleTimeString() });
            requestRender();
            // 更新左侧颜色（仅当筛选为"全部"或匹配时）
            const filter = filterStatusSelect.value;
            if (filter === 'all' || (filter === 'normal' && status === '正常') || (filter === 'error' && status ===
                    '异常')) {
                updateUrlColor(url, status === '正常');
            }
        }

        // 渲染节流
        let renderTimer = null;

        function requestRender() {
            if (renderTimer) return;
            renderTimer = setTimeout(() => {
                renderTimer = null;
                displayLogs();
            }, 100);
        }

        function updateUrlColor(url, isNormal) {
            const items = urlList.querySelectorAll('li');
            items.forEach(item => {
                if (item.dataset.url === url) {
                    item.style.backgroundColor = isNormal ? '#e8f5e9' : '#ffebee';
                    const link = item.querySelector('.url-text');
                    link.style.color = isNormal ? 'green' : 'red';
                }
            });
        }

        function displayLogs() {
            const filter = filterStatusSelect.value;
            let filtered = logs;
            if (filter === 'normal') filtered = logs.filter(l => l.status === '正常');
            else if (filter === 'error') filtered = logs.filter(l => l.status === '异常');

            // 为保持性能，只显示最新的2000条
            const subset = filtered.length > 2000 ? filtered.slice(-2000) : filtered;

            logContainer.innerHTML = '';
            subset.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                const colorClass = log.status === '正常' ? 'status-normal' : 'status-error';
                div.innerHTML =
                    `<span style="color:#888">[${log.timestamp}]</span> <span class="${colorClass}"><b>${log.status}</b></span> ${log.url} (${log.time}ms) ${log.error ? `<span style="color:red">${log.error}</span>` : ''}`;
                logContainer.appendChild(div);
            });
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 筛选变化
        filterStatusSelect.addEventListener('change', () => {
            displayLogs();
            // 同时更新左侧列表颜色
            resetAllUrlColors();
            highlightListByFilter();
        });

        function resetAllUrlColors() {
            const items = urlList.querySelectorAll('li');
            items.forEach(item => {
                item.style.backgroundColor = '#fff';
                const link = item.querySelector('.url-text');
                link.style.color = '#333';
            });
        }

        function highlightListByFilter() {
            const filter = filterStatusSelect.value;
            if (filter === 'all') return;
            // 根据最近一次检测结果给列表着色
            const statusMap = new Map();
            for (let i = logs.length - 1; i >= 0; i--) {
                const log = logs[i];
                if (!statusMap.has(log.url)) statusMap.set(log.url, log.status);
            }
            const items = urlList.querySelectorAll('li');
            items.forEach(item => {
                const url = item.dataset.url;
                const status = statusMap.get(url);
                if (status) {
                    const isNormal = status === '正常';
                    if ((filter === 'normal' && isNormal) || (filter === 'error' && !isNormal)) {
                        item.style.backgroundColor = isNormal ? '#e8f5e9' : '#ffebee';
                        const link = item.querySelector('.url-text');
                        link.style.color = isNormal ? 'green' : 'red';
                    }
                }
            });
        }

        // URL 添加/删除
        addUrlButton.addEventListener('click', () => {
            let url = urlInput.value.trim();
            if (!url) return;
            if (!url.match(/^https?:\/\//)) url = 'https://' + url;
            if (urls.includes(url)) {
                alert('网址已存在');
                return;
            }
            urls.push(url);
            addUrlToList(url);
            updateUrlCount();
            urlInput.value = '';
        });

        function addUrlToList(url) {
            const li = document.createElement('li');
            li.dataset.url = url;

            const span = document.createElement('a');
            span.className = 'url-text';
            span.href = url;
            span.target = '_blank';
            span.textContent = url;

            const btn = document.createElement('button');
            btn.textContent = '删除';
            btn.onclick = () => {
                urls = urls.filter(u => u !== url);
                li.remove();
                updateUrlCount();
            };

            li.appendChild(span);
            li.appendChild(btn);
            urlList.appendChild(li);
        }

        function updateUrlCount() {
            document.getElementById('url-count').textContent = urls.length;
        }

        // 导入书签（支持HTML收藏夹和XLSX文件）
        importBookmarksButton.addEventListener('click', () => {
            const file = bookmarkFileInput.files[0];
            if (!file) {
                alert('请先选择文件（支持HTML收藏夹或XLSX文件）');
                return;
            }
            const ext = file.name.split('.').pop().toLowerCase();

            if (ext === 'html' || ext === 'htm') {
                // HTML收藏夹解析
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/html');
                    const anchors = doc.querySelectorAll('a[href]');
                    let count = 0;
                    anchors.forEach(a => {
                        let href = a.getAttribute('href');
                        if (href && href.startsWith('http')) {
                            if (!urls.includes(href)) {
                                urls.push(href);
                                addUrlToList(href);
                                count++;
                            }
                        }
                    });
                    updateUrlCount();
                    alert(`成功导入 ${count} 个网址（来自HTML收藏夹）`);
                };
                reader.onerror = () => {
                    alert('读取文件失败，请重试');
                };
                reader.readAsText(file);
            } else if (ext === 'xlsx') {
                // XLSX文件解析
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const foundUrls = new Set();
                        // 遍历所有工作表
                        workbook.SheetNames.forEach(sheetName => {
                            const sheet = workbook.Sheets[sheetName];
                            // 使用header:1将数据转为二维数组，遍历所有单元格
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                            rows.forEach(row => {
                                if (Array.isArray(row)) {
                                    row.forEach(cell => {
                                        const cellStr = String(cell).trim();
                                        if (cellStr.startsWith('http://') || cellStr
                                            .startsWith('https://')) {
                                            foundUrls.add(cellStr);
                                        }
                                    });
                                }
                            });
                        });
                        let count = 0;
                        foundUrls.forEach(url => {
                            if (!urls.includes(url)) {
                                urls.push(url);
                                addUrlToList(url);
                                count++;
                            }
                        });
                        updateUrlCount();
                        alert(`成功导入 ${count} 个网址（来自XLSX文件，共发现 ${foundUrls.size} 个URL，其中 ${count} 个为新网址）`);
                    } catch (err) {
                        console.error(err);
                        alert('解析XLSX文件失败，请确认文件格式正确。错误信息：' + err.message);
                    }
                };
                reader.onerror = () => {
                    alert('读取文件失败，请重试');
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('不支持的文件格式（"' + ext + '"），请选择HTML收藏夹文件或XLSX文件');
            }
            // 清空文件选择器，以便重新选择同一文件时也能触发change
            bookmarkFileInput.value = '';
            fileNameSpan.textContent = '';
        });

        // 开始/停止检测
        checkOnceButton.addEventListener('click', () => {
            if (isChecking) {
                stopRequested = true;
                checkOnceButton.textContent = '停止中...';
                requestQueue.length = 0;
                return;
            }
            if (urls.length === 0) {
                alert('请先添加网址');
                return;
            }
            isChecking = true;
            stopRequested = false;
            finishedCount = 0;
            normalCount = 0;
            errorCount = 0;
            totalToCheck = urls.length;

            checkOnceButton.textContent = '停止检测';
            checkOnceButton.classList.add('danger');
            progressBarContainer.style.display = 'block';
            progressBar.style.width = '0%';
            summaryText.textContent = '';

            urls.forEach(url => scheduleCheck(url));
        });

        // 导出日志为XLSX（根据筛选）
        exportLogsButton.addEventListener('click', () => {
            const filter = filterStatusSelect.value;
            let exportLogs = logs;
            if (filter === 'normal') exportLogs = logs.filter(l => l.status === '正常');
            else if (filter === 'error') exportLogs = logs.filter(l => l.status === '异常');

            if (exportLogs.length === 0) {
                alert('没有可导出的日志');
                return;
            }

            // 构建导出数据（带序号）
            const exportData = exportLogs.map((l, index) => ({
                '序号': index + 1,
                '时间': l.timestamp,
                '网址': l.url,
                '状态': l.status,
                '响应时间(ms)': l.time,
                '错误信息': l.error || ''
            }));

            // 使用XLSX库生成并下载
            const ws = XLSX.utils.json_to_sheet(exportData);
            // 设置列宽
            ws['!cols'] = [
                { wch: 6 }, // 序号
                { wch: 12 }, // 时间
                { wch: 50 }, // 网址
                { wch: 8 }, // 状态
                { wch: 14 }, // 响应时间
                { wch: 30 } // 错误信息
            ];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '检测日志');
            const filename = `网站监测日志_${new Date().toISOString().slice(0, 10)}.xlsx`;
            XLSX.writeFile(wb, filename);
        });

        // 清空操作
        clearLogsButton.addEventListener('click', () => {
            logs = [];
            logContainer.innerHTML = '';
            summaryText.textContent = '';
            resetAllUrlColors();
        });

        clearUrlsButton.addEventListener('click', () => {
            if (confirm('确定清空所有网址吗？')) {
                urls = [];
                urlList.innerHTML = '';
                updateUrlCount();
                resetAllUrlColors();
            }
        });

        // 初始化渲染
        displayLogs();
    </script>
</body>
</html>
